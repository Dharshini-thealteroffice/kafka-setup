services:
  kafka-controller:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka-controller
    container_name: kafka-controller
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: ${CLUSTER_ID}
      KAFKA_PROCESS_ROLES: controller

      KAFKA_LISTENERS: CONTROLLER://kafka-controller:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:SSL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller:9093

      KAFKA_SSL_KEYSTORE_TYPE: PEM
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/controller.pem

      KAFKA_SSL_TRUSTSTORE_TYPE: PEM
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/ca.crt

      KAFKA_SSL_CLIENT_AUTH: required
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
      KAFKA_SUPER_USERS: "User:$ADMIN_USERNAME"

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    command: >
      bash -c '
      /etc/confluent/docker/configure
      
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        echo "Formatting KRaft storage..."
    
        kafka-storage format \
          --ignore-formatted \
          --cluster-id $CLUSTER_ID \
          --config /etc/kafka/kafka.properties \
          --add-scram "SCRAM-SHA-256=[name=$ADMIN_USERNAME,password=$ADMIN_PASSWORD]"
      fi
      
      /etc/confluent/docker/run
      ' 

    volumes:
      - ./secrets/controller.pem:/etc/kafka/secrets/controller.pem:ro
      - ./secrets/ca.crt:/etc/kafka/secrets/ca.crt:ro
      - kafka-controller-data:/var/lib/kafka/data

    networks:
      - kafka-net

  kafka-broker:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka-broker
    container_name: kafka-broker
    restart: unless-stopped
    depends_on:
      - kafka-controller

    environment:
      KAFKA_NODE_ID: 2
      CLUSTER_ID: ${CLUSTER_ID}
      KAFKA_PROCESS_ROLES: broker

      KAFKA_LISTENERS: BROKER://kafka-broker:9092,CLIENT://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka-broker:9092,CLIENT://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "BROKER:SSL,CLIENT:SASL_SSL,CONTROLLER:SSL"

      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-controller:9093

      # BROKER + CLIENT listeners config
      KAFKA_SSL_KEYSTORE_TYPE: PEM
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/broker.pem

      KAFKA_SSL_TRUSTSTORE_TYPE: PEM
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/ca.crt

      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

      # broker → controller (mTLS) config
      KAFKA_LISTENER_NAME_CONTROLLER_SSL_KEYSTORE_TYPE: PEM
      KAFKA_LISTENER_NAME_CONTROLLER_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/broker.pem
      KAFKA_LISTENER_NAME_CONTROLLER_SSL_TRUSTSTORE_TYPE: PEM
      KAFKA_LISTENER_NAME_CONTROLLER_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/ca.crt
      KAFKA_LISTENER_NAME_CONTROLLER_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

      # SASL config
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_LISTENER_NAME_CLIENT_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_OPTS: > 
        -Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf
    
      # Replication / topic defaults config
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # ACL config
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_SUPER_USERS: "User:$ADMIN_USERNAME"

      KAFKA_LOG_DIRS: /var/lib/kafka/data  

    ports:
      - "19092:19092"

    volumes:
      - ./secrets/broker.pem:/etc/kafka/secrets/broker.pem:ro
      - ./secrets/ca.crt:/etc/kafka/secrets/ca.crt:ro
      - kafka-broker-data:/var/lib/kafka/data
      - ./kafka_server_jaas.conf:/etc/kafka/secrets/kafka_server_jaas.conf:ro

    networks:
      - kafka-net

volumes:
  kafka-controller-data:
  kafka-broker-data:

networks:
  kafka-net:
    driver: bridge